# Eval regression gate — synthetic gold suites (ADR 007).
#
# Fast path: bundled gold data, no ephemeral Docker stack. Blocks metric
# regression on retrieval precision@5, extraction recall, categorization
# accuracy. Live Mem0 eval against expanded gold is a follow-up (BACKLOG).
#
# Schedule: Sunday 03:30 UTC (09:00 IST) — offset from weekly-scan (Saturday).
name: eval-suite

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run eval gate (ADR 007 thresholds)
        run: |
          python scripts/run_eval_gate.py \
            --report-md eval-report.md \
            --report-json eval-report.json

      - name: Post eval summary
        if: always()
        run: cat eval-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval-report.md
            eval-report.json
