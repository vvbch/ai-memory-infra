# CI — lint + type + test + contract gates on every push/PR (AGENTS.md
# "Engineering practices"). Failures trigger ci-autofix.yml (fix-on-failure
# agent) instead of waiting for the weekly scan.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Types (mypy)
        run: mypy src

      - name: Tests (pytest, coverage gate 80%)
        run: pytest

      - name: Memory-contract conformance (ADR 028/031)
        run: python scripts/check_memory_contract.py

      - name: STATUS.md snapshot shape (COE 2026-06-10)
        run: python scripts/check_status_snapshot.py

      - name: Operating-contract render freshness (ADR 033)
        run: python scripts/render_contract.py --check

      - name: Editor pointer-file purity (ADR 018)
        run: python scripts/check_pointer_purity.py
