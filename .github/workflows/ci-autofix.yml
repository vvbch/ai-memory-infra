# Fix-on-failure agent — runs whenever CI fails on main (rather than waiting
# for the weekly scan; operator request 2026-06-10). Same portability stance as
# weekly-scan.yml: GitHub Actions orchestration, swappable agent CLI.
#
# Scope: TWO-WAY DOORS ONLY (revertible code/test/doc fixes), delivered as a
# PR — never a push to main, never anything touching live data or infra.
#
# Required repository secret: CURSOR_API_KEY.
name: ci-autofix

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Install agent CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Diagnose and fix the failure
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent -p "CI failed on main for this exact checkout. Read AGENTS.md first. \
          Reproduce locally by running: ruff check ., mypy src, pytest, \
          python scripts/check_memory_contract.py, python scripts/check_status_snapshot.py. \
          Find the root cause and fix it. Two-way doors only: revertible code/test/doc \
          changes; if intended behavior is unclear, ADRs and documented contracts win over \
          code. NEVER touch live data/infra, never weaken a gate or delete a failing test \
          just to go green — if the only fix is a one-way door or a gate change, stop and \
          write your analysis to docs/reports/ci-autofix-blocked.md instead. Re-run all five \
          commands and confirm green before finishing. Leave changes uncommitted." \
            --force --output-format text

      - name: Open fix PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci-autofix/${{ github.event.workflow_run.head_sha }}
          commit-message: "fix(ci): automated fix for CI failure on main"
          title: "CI autofix: ${{ github.event.workflow_run.head_branch }}@${{ github.event.workflow_run.head_sha }}"
          body: |
            CI failed on main (run: ${{ github.event.workflow_run.html_url }}).
            This PR contains an automated, two-way-door fix. Review before merge;
            a `git revert` fully undoes it.
          delete-branch: true
