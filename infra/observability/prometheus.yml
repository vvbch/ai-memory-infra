# Prometheus scrape config for the ai-memory-infra stack (ADR 008 / ADR 014).
#
# mem0:8000/metrics is the Phase-1 shift-left target (ADR 014). Until the Mem0
# server exposes it, that target may stay DOWN — host metrics from node-exporter
# still land. Wire the app endpoint when Mem0 instrumentation ships.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: mem0
    metrics_path: /metrics
    static_configs:
      - targets: ["mem0:8000"]
