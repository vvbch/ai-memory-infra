# Local dev stack — the full memory layer on one machine.
#
# Topology (verified against mem0ai/mem0 server/docker-compose.yaml on main):
#   caddy           reverse proxy + auto-HTTPS (only thing that faces the net)
#   mem0            FastAPI REST + MCP; built-in JWT auth (AUTH_DISABLED=false)
#   postgres        PostgreSQL + pgvector (vector store)
#   neo4j           knowledge graph (Mem0 graph + LifeGraph), APOC enabled
#   mem0-dashboard  Next.js admin UI (ships in the OSS server compose)
#
# Prometheus + Grafana are intentionally NOT here yet — they're Phase 8
# (tenet 7: add a moving part only when its value beats its upkeep). The
# `monitor.` subdomain/DNS is reserved now; its Caddy route lights up in Phase 8.
#
# All ports bind to 127.0.0.1 — nothing is directly reachable except through
# Caddy. Secrets and model/provider settings come from .env (see .env.example).

name: ai-memory-infra

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - mem0
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mem0_network

  mem0:
    # Built from source for linux/amd64 — the published mem0/mem0-api-server image
    # is arm64-only (no amd64 manifest), and the stock requirements omit the Neo4j
    # graph extras we need. See infra/mem0-server.Dockerfile. Build on the host:
    #   docker build -f infra/mem0-server.Dockerfile -t mem0-api-server:local <mem0-src>/server
    image: mem0-api-server:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # --- datastores (internal hostnames) ---
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-mem0}
      - POSTGRES_USER=${POSTGRES_USER:-mem0}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_COLLECTION_NAME=memories
      # Auth/admin tables (users/api_keys/request_logs) — the server defaults to a
      # separate "mem0_app" DB (db.py APP_DB_NAME). We consolidate into the same
      # `mem0` database (different tables, no conflict) to avoid a 2nd DB + init
      # script (tenet 7). Set APP_DB_NAME=mem0_app + create that DB to split later.
      - APP_DB_NAME=${POSTGRES_DB:-mem0}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # --- auth (built into the server) ---
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3000}
      # --- models / providers come from .env (LLM + embedder) ---
    volumes:
      # Mem0 keeps a SQLite "history" DB at /app/history (HISTORY_DB_PATH default).
      # The dir doesn't exist in the image, so mount a named volume — this both
      # creates it (writable) and persists edit history across container recreates.
      - mem0_history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8888:8000" # dev convenience; prod overlay drops this
    networks:
      - mem0_network

  postgres:
    image: ankane/pgvector:v0.5.1 # matches upstream mem0 server; pgvector preinstalled
    restart: unless-stopped
    shm_size: "128mb"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mem0}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mem0}
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "${POSTGRES_USER:-mem0}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:8432:5432" # dev only
    networks:
      - mem0_network

  neo4j:
    image: neo4j:5.26.4 # 5.x + APOC, matches mem0's tested setup
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s # Neo4j is the slowest to come up
    volumes:
      - neo4j_data:/data
    ports:
      - "127.0.0.1:7474:7474" # browser (dev); prod reaches it via graph. subdomain
      - "127.0.0.1:7687:7687" # bolt
    networks:
      - mem0_network

  mem0-dashboard:
    # Next.js admin UI. No published image exists — it must be built from the mem0
    # repo's server/dashboard context. Deferred for Phase 1 and gated behind a
    # compose profile so the default `up` skips it (enable later with
    # `docker compose --profile dashboard ...` once an image is built).
    image: mem0/mem0-dashboard:latest
    profiles: ["dashboard"]
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${DASHBOARD_API_URL:-http://localhost:8888}
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=ai-memory-infra
    depends_on:
      mem0:
        condition: service_started
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000" # dev only
    networks:
      - mem0_network

volumes:
  postgres_data:
  neo4j_data:
  caddy_data:
  caddy_config:
  mem0_history:

networks:
  mem0_network:
    driver: bridge
